[platformio]
default_envs = esp

[env]
framework = arduino
monitor_speed = 115200

build_flags =
    -std=gnu++17
    -Iinclude
    -Iexternal

lib_ldf_mode = deep+

lib_deps =
    earlephilhower/ESP8266Audio


[env:esp]
platform = espressif8266
board = nodemcuv2
board_build.f_cpu = 160000000L

build_flags =
    ${env.build_flags}
    -DPLATFORM_ESP

build_src_filter =
    +<main.cpp>
    -<tests/>


[env:esp_ladder_test]
platform = espressif8266
board = nodemcuv2
board_build.f_cpu = 160000000L

build_flags =
    ${env.build_flags}
    -DPLATFORM_ESP

build_src_filter =
    -<*>
    +<tests/esp8266_platform/AnalogLadderCalibration.cpp>


